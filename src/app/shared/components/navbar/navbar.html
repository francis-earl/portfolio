<header
  class="fixed inset-x-0 top-0 z-40 flex items-center justify-between border-b border-stone-200 bg-white px-4 py-3 lg:hidden"
>
  <h1 class="text-lg font-semibold">Francis Earl</h1>
  <button
    type="button"
    class="inline-flex h-10 w-10 items-center justify-center bg-white text-xl text-stone-600 transition-colors hover:bg-amber-50 hover:text-amber-700"
    (click)="toggleMenu()"
    aria-label="Open navigation"
  >
    <ng-icon name="heroBars3" class="h-6 w-6 text-amber-700"> </ng-icon>
  </button>
</header>

<aside
  class="fixed inset-y-0 left-0 z-50 w-72 max-w-full overflow-y-auto border-r border-stone-200 bg-stone-50 px-4 pt-6 pb-8 text-stone-900 transition-transform duration-300 ease-in-out lg:translate-x-0"
  [class.-translate-x-full]="!isOpen()"
  [class.translate-x-0]="isOpen()"
>
  <div class="px-2 pb-6">
    <div class="flex items-start justify-between">
      <div>
        <h1 class="text-xl font-bold tracking-wide text-stone-900 lg:text-2xl">Francis Earl</h1>

        <p class="mt-1 text-sm text-stone-500">Software Engineer</p>
      </div>

      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center text-stone-600 transition-colors hover:bg-amber-50 hover:text-amber-700 lg:hidden"
        (click)="closeMenu()"
        aria-label="Close navigation"
      >
        <ng-icon name="heroXMark" class="h-6 w-6 text-amber-700"></ng-icon>
      </button>
    </div>

    <hr class="my-4 border-stone-200" />
  </div>

  <nav class="space-y-2 px-2">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active-link bg-amber-50 text-amber-700 font-semibold"
        class="group relative flex items-center gap-4 px-6 py-3 text-stone-700 transition-colors duration-200 hover:bg-amber-50 hover:text-amber-700"
        (click)="closeMenu()"
      >
        <span class="indicator absolute inset-y-2 left-0 w-1 bg-amber-700"></span>
        <ng-icon [name]="item.icon" class="h-6 w-6 shrink-0 text-amber-700" />
        <span>{{ item.name }}</span>
      </a>
    }
  </nav>
</aside>

@if (isOpen()) {
  <div
    class="fixed inset-0 z-40 bg-stone-900/20 backdrop-blur-sm lg:hidden"
    (click)="closeMenu()"
  ></div>
}
